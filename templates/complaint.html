<!DOCTYPE html>
<html>
<head>
    <title>Submit Complaint</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #2c3e50, #4ca1af);
            min-height: 100vh;
        }

        .form-card {
            border-radius: 15px;
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center p-4">

<div class="card form-card shadow p-4" style="width: 500px;">

    <h3 class="text-center mb-3">Submit Complaint</h3>

    <form method="POST" enctype="multipart/form-data">

        <label class="form-label">User</label>
        <input type="text" class="form-control mb-3" value="{{ session['user'] }}" readonly>

        <label class="form-label">Location</label>
        <input type="text" name="location" class="form-control mb-3" required>

        <label class="form-label">Title</label>
        <input type="text" name="title" class="form-control mb-3" required>

        <label class="form-label">Description</label>
        <textarea name="description" class="form-control mb-3" rows="3" required></textarea>

        <label class="form-label">Severity</label>
        <select name="severity" class="form-select mb-3" required>
            <option value="">Select severity</option>
            <option>Low</option>
            <option>Medium</option>
            <option>High</option>
        </select>

        <label class="form-label">Upload Image</label>
        <input type="file" name="image" class="form-control mb-3" required>

        <button class="btn btn-dark w-100">Submit Complaint</button>

    </form>

</div>

</body>
</html>
