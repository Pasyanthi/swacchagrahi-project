<!DOCTYPE html>
<html>
<head>
    <title>Select System</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #1d2b64, #f8cdda);
            min-height: 100vh;
        }

        .card-option {
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
        }

        .card-option:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }
    </style>
</head>

<body class="d-flex justify-content-center align-items-center">

<div class="container text-center">

    <h2 class="text-white mb-4">Select System</h2>

    <div class="row justify-content-center">

        <!-- CITY -->
        <div class="col-md-4">
            <a href="/set_category/city" style="text-decoration:none;">
                <div class="card card-option shadow p-4">

                    <i class="bi bi-building fs-1 text-primary"></i>

                    <h5 class="mt-3">City Issues</h5>

                    <p class="text-muted">
                        Report public issues like garbage, roads, drainage, etc.
                    </p>

                </div>
            </a>
        </div>

        <!-- UNIVERSITY -->
        <div class="col-md-4">
            <a href="/set_category/university" style="text-decoration:none;">
                <div class="card card-option shadow p-4">

                    <i class="bi bi-mortarboard fs-1 text-success"></i>

                    <h5 class="mt-3">University Issues</h5>

                    <p class="text-muted">
                        Report campus-related problems like facilities or complaints.
                    </p>

                </div>
            </a>
        </div>

    </div>

</div>

</body>
</html>
